<app-header-voltar texto="Novo Módulo"></app-header-voltar>
<style>
  @media (min-width: 1200px) {
    .cadastro-modulo-pagina {
      padding-inline: clamp(2rem, 4vw, 4rem);
    }

    .cadastro-modulo-container {
      width: min(84vw, 1080px);
      margin-inline: auto;
      padding-inline: clamp(1.75rem, 2vw, 2.5rem);
    }

    .cadastro-modulo-campos-inline {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 1rem;
      align-items: start;
    }
  }

  @media (min-width: 1440px) {
    .cadastro-modulo-container {
      width: min(78vw, 1200px);
    }

    .cadastro-modulo-aviso {
      max-width: 68ch;
    }

    .cadastro-modulo-campo {
      max-width: 100%;
    }
  }

  @media (min-width: 1600px) {
    .cadastro-modulo-pagina {
      padding-inline: clamp(3rem, 8vw, 8rem);
    }

    .cadastro-modulo-container {
      width: min(72vw, 1280px);
    }

    .cadastro-modulo-campos-inline {
      column-gap: 1.25rem;
    }
  }
</style>
<div class="container-background" >
  <div class="cadastro-modulo-pagina" *ngIf="!carregando; else tela">
    <div class="cadastro-modulo-container">
      <h2 class="cadastro-modulo-titulo">Cadastrar Módulo</h2>
      <p class="cadastro-modulo-aviso">* Indica campos obrigatórios</p>
      <form [formGroup]="moduloForm">
        <div class="cadastro-modulo-campos-inline">
          <div class="cadastro-modulo-campo">
            <label for="nome_modulo" class="cadastro-modulo-label">Nome do Módulo<span> *</span></label>
            <input id="nome_modulo"  class="cadastro-modulo-input"
              formControlName="nome_modulo" (input)="gerarUrlAmigavel()" />
              <div
            *ngIf="
              moduloForm.get('nome_modulo')?.invalid &&
              moduloForm.get('nome_modulo')?.touched
            "
          >
            <small class="mensagem-validacao">Nome do módulo é obrigatório</small>
          </div>
          </div>
          <div class="cadastro-modulo-campo">
            <label for="nome_url" class="cadastro-modulo-label">URL do Módulo<span> *</span></label>
            <input id="nome_url" class="cadastro-modulo-input" formControlName="nome_url" readonly />
          </div>
        </div>
        <div class="cadastro-modulo-campo file-field">
          <label for="ebookUrlGeral" class="cadastro-modulo-label upload-btn file-bnt">
            Ebook Geral<span> *</span>
          </label>

          <div class="file-input-wrapper">
            <input id="ebookUrlGeral" type="file" (change)="onSelectedFile($event)" accept="application/pdf" class="cadastro-modulo-input"
              formControlName="ebookUrlGeral" />
            <span class="file-status-text">{{ selectedFile ? selectedFile.name : 'Nenhum arquivo selecionado' }}</span>
          </div>
        </div>
        <div
            *ngIf="!selectedFile && tentouSubmeter"
          >
            <small class="mensagem-validacao">Upload do arquivo é obrigatório</small>
          </div>
        <div class="cadastro-modulo-campo">
          <label for="video_inicial" class="cadastro-modulo-label">Vídeo Inicial<span> *</span></label>
          <input id="video_inicial" class="cadastro-modulo-input"
            formControlName="video_inicial" />
            <div
            *ngIf="
              moduloForm.get('video_inicial')?.invalid &&
              moduloForm.get('video_inicial')?.touched
            "
          >
            <small class="mensagem-validacao">URL do vídeo inicial é obrigatório</small>
          </div>
        </div>
        <div class="cadastro-modulo-buttons">
          <button type="button" (click)="voltarPagina()" id="botao-um">Cancelar</button>
          <button type="submit"  id="botao-dois" (click)="onSubmit()">Cadastrar Módulo</button>
        </div>
      </form>
    </div>
  </div>
  <ng-template #tela>
    <div class="carregando-registro">
      <h2 class="">Cadastrando módulo...</h2>
    </div>
  </ng-template>
</div>
